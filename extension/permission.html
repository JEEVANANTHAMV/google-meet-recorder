<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enable Microphone — Google Meet Recorder</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #1c1c1e; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .card { max-width: 440px; padding: 32px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; text-align: center; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    .icon { font-size: 40px; margin-bottom: 12px; }
    #status { font-size: 14px; line-height: 1.5; margin: 16px 0; color: #ddd; }
    .ok { color: #34c759; }
    .err { color: #ff9f0a; }
    button { background: #0a84ff; color: #fff; border: none; border-radius: 10px;
      padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:hover { opacity: 0.9; }
    .hint { font-size: 12px; color: #888; margin-top: 16px; line-height: 1.5; }
    code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎤</div>
    <h1>Enable microphone capture</h1>
    <p id="status">Requesting microphone permission…</p>
    <button id="retry" style="display:none;">Request again</button>
    <p class="hint">This is a one-time setup. Once allowed, your voice is mixed into recordings automatically.
      If it stays blocked, click the camera/🔒 icon in the address bar (or open
      <code>chrome://settings/content/microphone</code>) and set this extension to <b>Allow</b>.</p>
  </div>
  <script src="permission.js"></script>
</body>
</html>
